# 生产环境 — geotrave-db 独立部署
# 使用方式：scp 此文件到服务器 /home/geotrave/docker-compose.db.yml
#          docker compose -f docker-compose.db.yml up -d db
#          （首次启动后运行 db-init 导入 OSM 数据）

services:
  db:
    image: ${DOCKERHUB_USERNAME:-linnene}/geotrave-db:latest
    container_name: geotrave-db
    environment:
      POSTGRES_DB: geotrave
      POSTGRES_USER: geotrave
      POSTGRES_PASSWORD: ${DB_PASSWORD:?必须设置数据库密码}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ${OSM_DATA_DIR:-./osm_data}:/osm_data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geotrave -d geotrave"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  db-init:
    image: ${DOCKERHUB_USERNAME:-linnene}/geotrave-db:latest
    container_name: geotrave-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:?必须设置数据库密码}
    entrypoint: >
      sh -c "
      osm2pgsql -U geotrave -d geotrave -H db -c -s -C 4096 /osm_data/hokkaido-260426.osm.pbf &&
      psql -U geotrave -d geotrave -h db -f /scripts/02-views.sql &&
      psql -U geotrave -d geotrave -h db -f /scripts/03-indexes.sql &&
      psql -U geotrave -d geotrave -h db -f /scripts/04-topology.sql &&
      echo 'OSM import and setup complete.'
      "
    volumes:
      - ${OSM_DATA_DIR:-./osm_data}:/osm_data:ro
    profiles:
      - init

volumes:
  pgdata:
