name: CD - PostGIS Database

on:
  push:
    branches: ["master"]
    paths:
      - "database/postgis/**"
  workflow_dispatch:
    inputs:
      force_init:
        description: "重新导入 OSM 数据（执行 db-init）"
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push DB image
        uses: docker/build-push-action@v5
        with:
          context: database/postgis
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/geotrave-db:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy DB to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/geotrave

            # Write production compose file (avoid SCP permission issues)
            cat > docker-compose.db.yml << 'COMPOSE_EOF'
            services:
              db:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/geotrave-db:latest
                container_name: geotrave-db
                environment:
                  POSTGRES_DB: geotrave
                  POSTGRES_USER: geotrave
                  POSTGRES_PASSWORD: ${DB_PASSWORD:?必须设置数据库密码}
                ports:
                  - "5432:5432"
                volumes:
                  - pgdata:/var/lib/postgresql/data
                  - ${OSM_DATA_DIR:-./osm_data}:/osm_data:ro
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U geotrave -d geotrave"]
                  interval: 5s
                  retries: 5
                restart: unless-stopped

              db-init:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/geotrave-db:latest
                container_name: geotrave-db-init
                depends_on:
                  db:
                    condition: service_healthy
                environment:
                  PGPASSWORD: ${DB_PASSWORD:?必须设置数据库密码}
                entrypoint: >
                  sh -c "
                  osm2pgsql -U geotrave -d geotrave -H db -c -s -C 4096 /osm_data/hokkaido-260426.osm.pbf &&
                  psql -U geotrave -d geotrave -h db -f /scripts/02-views.sql &&
                  psql -U geotrave -d geotrave -h db -f /scripts/03-indexes.sql &&
                  psql -U geotrave -d geotrave -h db -f /scripts/04-topology.sql &&
                  echo 'OSM import and setup complete.'
                  "
                volumes:
                  - ${OSM_DATA_DIR:-./osm_data}:/osm_data:ro
                profiles:
                  - init

            volumes:
              pgdata:
            COMPOSE_EOF

            # Pull latest DB image
            docker compose -f docker-compose.db.yml pull db

            # Restart the DB container with new image
            docker compose -f docker-compose.db.yml up -d db

            # Optionally re-run OSM import (manual trigger only)
            if [ "${{ github.event.inputs.force_init }}" = "true" ]; then
              echo "Force init requested — running OSM import..."
              docker compose -f docker-compose.db.yml --profile init run --rm db-init
            fi

            # Prune old images
            docker image prune -f
