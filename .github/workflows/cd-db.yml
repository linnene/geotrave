name: CD - PostGIS Database

on:
  push:
    branches: ["master"]
    paths:
      - "database/postgis/**"
  workflow_dispatch:
    inputs:
      force_init:
        description: "重新导入 OSM 数据（执行 db-init）"
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push DB image
        uses: docker/build-push-action@v5
        with:
          context: database/postgis
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/geotrave-db:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: database/postgis/docker-compose.prod.yml
          target: /home/geotrave/
          strip_components: 2
          overwrite: true

      - name: Deploy DB to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/geotrave

            # Rename uploaded compose file
            mv -f docker-compose.prod.yml docker-compose.db.yml 2>/dev/null || true

            # Pull latest DB image
            docker compose -f docker-compose.db.yml pull db

            # Restart the DB container with new image
            docker compose -f docker-compose.db.yml up -d db

            # Optionally re-run OSM import (manual trigger only)
            if [ "${{ github.event.inputs.force_init }}" = "true" ]; then
              echo "Force init requested — running OSM import..."
              docker compose -f docker-compose.db.yml --profile init run --rm db-init
            fi

            # Prune old images
            docker image prune -f
