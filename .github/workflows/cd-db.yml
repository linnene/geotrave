name: CD - DB Build and Deploy

on:
  push:
    branches: ["master"]
    paths:
      - 'database/postgis/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push DB
        uses: docker/build-push-action@v5
        with:
          context: database/postgis
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/geotrave-db:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy DB to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/geotrave-repo
            git fetch origin master && git reset --hard origin/master
            sudo cp docker-compose.db.yml /home/geotrave/
            cd /home/geotrave

            echo "=== DB Compose deployed ==="
            head -3 docker-compose.db.yml

            docker compose -f docker-compose.db.yml pull db
            docker compose -f docker-compose.db.yml up -d
            docker image prune -f
