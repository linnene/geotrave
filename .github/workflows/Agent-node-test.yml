name: GeoTrave-base-test-CI (uv)

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. pull code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # 3. set up Python
      - name: Set up Python
        run: uv python install

      # 4. 安装项目依赖 (包含 dev 依赖如 pytest)
      - name: Install dependencies
        run: uv sync --frozen

      # 5. 运行全维度 Agent 评估测试 (Dimension 2: Workflow)
      - name: Run Agent Workflow Evaluation
        env:
          GLOBAL_MODEL_API_KEY: ${{ secrets.GLOBAL_MODEL_API_KEY }}
          GLOBAL_MODEL_BASE_URL: ${{ secrets.GLOBAL_MODEL_BASE_URL }}
          GLOBAL_MODEL_ID: ${{ secrets.GLOBAL_MODEL_ID }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_MODEL_API_KEY: ${{ secrets.EMBEDDING_MODEL_API_KEY }}
        run: uv run pytest test/ -v
